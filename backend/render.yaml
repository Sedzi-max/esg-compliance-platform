services:
  - type: web
    name: esg-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: JWT_SECRET
        generate: true

  - type: static
    name: esg-frontend
    buildCommand: npm run build
    publishPath: dist # or build, depending on your React setup
    routes:
      - type: rewrite
        source: /*
        destination: /index.html